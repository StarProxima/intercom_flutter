name: intercom_webview_example
description: "WebView-only Intercom example - не тянет нативный intercom_flutter SDK."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Только webview-пакет. Нативный intercom_flutter сюда намеренно не
  # подключаем - этот example существует чтобы демонстрировать прокси-WebView
  # без линковки нативного Intercom SDK.
  intercom_flutter_webview:
    path: ../

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
